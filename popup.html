<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Lock In Twin</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Black+Ops+One&family=Barlow:wght@400;500;600;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 260px;
    background: #080808;
    color: #fff;
    font-family: 'Barlow', sans-serif;
    user-select: none;
  }

  .top-bar {
    border-bottom: 1px solid #111;
    padding: 18px 20px 14px;
  }

  .logo-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 2px;
  }

  .logo-icon { font-size: 20px; }

  .logo-text {
    font-family: 'Black Ops One', cursive;
    font-size: 16px;
    color: #00ff88;
    letter-spacing: 0.05em;
  }

  .tagline {
    font-size: 11px;
    color: #333;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    padding-left: 30px;
  }

  .toggle-section {
    padding: 24px 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
  }

  .toggle-wrap {
    display: flex;
    align-items: center;
    justify-content: space-between;
    width: 100%;
    background: #0f0f0f;
    border: 1px solid #1a1a1a;
    border-radius: 10px;
    padding: 14px 18px;
    cursor: pointer;
    transition: border-color 0.2s;
  }

  .toggle-wrap:hover { border-color: #2a2a2a; }
  .toggle-wrap.on { border-color: #00ff8833; }

  .toggle-label {
    font-size: 14px;
    font-weight: 600;
    color: #ccc;
    letter-spacing: 0.02em;
  }
  .toggle-wrap.on .toggle-label { color: #fff; }

  .toggle-switch {
    width: 44px;
    height: 24px;
    background: #1a1a1a;
    border-radius: 99px;
    position: relative;
    transition: background 0.25s;
    flex-shrink: 0;
  }
  .toggle-wrap.on .toggle-switch { background: #00ff88; }

  .toggle-knob {
    position: absolute;
    top: 3px;
    left: 3px;
    width: 18px;
    height: 18px;
    background: #444;
    border-radius: 50%;
    transition: transform 0.25s cubic-bezier(0.34, 1.56, 0.64, 1), background 0.25s;
  }
  .toggle-wrap.on .toggle-knob {
    transform: translateX(20px);
    background: #000;
  }

  .status-pill {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 5px 14px;
    border-radius: 99px;
    background: #111;
    color: #333;
    border: 1px solid #1a1a1a;
    transition: all 0.3s;
  }
  .status-pill.on {
    background: #00ff8815;
    color: #00ff88;
    border-color: #00ff8833;
  }

  .info-box {
    width: 100%;
    background: #0d0d0d;
    border: 1px solid #141414;
    border-radius: 8px;
    padding: 12px 14px;
  }

  .info-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 12px;
    color: #444;
    padding: 4px 0;
  }
  .info-row + .info-row { border-top: 1px solid #111; }
  .info-val {
    color: #666;
    font-weight: 600;
    font-family: 'Barlow', sans-serif;
  }
  .info-val.green { color: #00ff88; }

  .footer {
    border-top: 1px solid #0f0f0f;
    padding: 10px 20px;
    font-size: 10px;
    color: #1f1f1f;
    text-align: center;
    letter-spacing: 0.05em;
    font-family: 'Barlow', monospace;
  }
</style>
</head>
<body>

<div class="top-bar">
  <div class="logo-row">
    <span class="logo-icon">🔒</span>
    <span class="logo-text">LOCK IN TWIN</span>
  </div>
  <div class="tagline">idle focus enforcer</div>
</div>

<div class="toggle-section">
  <div class="status-pill" id="status-pill">INACTIVE</div>

  <div class="toggle-wrap" id="toggle-wrap">
    <span class="toggle-label" id="toggle-label">Enable</span>
    <div class="toggle-switch">
      <div class="toggle-knob"></div>
    </div>
  </div>

  <div class="info-box">
    <div class="info-row">
      <span>Idle timer</span>
      <span class="info-val green">2 minutes</span>
    </div>
    <div class="info-row">
      <span>Alert style</span>
      <span class="info-val">fullscreen overlay</span>
    </div>
    <div class="info-row">
      <span>Auto-dismiss</span>
      <span class="info-val">10 seconds</span>
    </div>
  </div>
</div>

<div class="footer">move your mouse to reset the timer</div>

<script src="popup.js"></script>
</body>
</html>
